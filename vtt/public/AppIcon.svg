<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: Obsidian void with gold gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f101a"/>
      <stop offset="50%" stop-color="#14151f"/>
      <stop offset="100%" stop-color="#0a0b12"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#eab308" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#eab308" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base shield shape -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#bg-grad)" stroke="url(#ring-grad)" stroke-width="3"/>

  <!-- Radial glow behind rune -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring-grad)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#ring-grad)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Corner ornament: Top-Left -->
  <circle cx="90" cy="90" r="6" fill="#eab308" opacity="0.4"/>
  <circle cx="90" cy="90" r="12" fill="none" stroke="#eab308" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornament: Top-Right -->
  <circle cx="422" cy="90" r="6" fill="#eab308" opacity="0.4"/>
  <circle cx="422" cy="90" r="12" fill="none" stroke="#eab308" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornament: Bottom-Left -->
  <circle cx="90" cy="422" r="6" fill="#eab308" opacity="0.4"/>
  <circle cx="90" cy="422" r="12" fill="none" stroke="#eab308" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornament: Bottom-Right -->
  <circle cx="422" cy="422" r="6" fill="#eab308" opacity="0.4"/>
  <circle cx="422" cy="422" r="12" fill="none" stroke="#eab308" stroke-width="0.5" opacity="0.2"/>

  <!-- Primary Rune: ᚱ (Elder Futhark "Raido" — journey/quest) -->
  <text x="256" y="300" font-family="serif" font-size="240" font-weight="bold" fill="url(#gold-grad)" text-anchor="middle" dominant-baseline="central" filter="drop-shadow(0 0 24px rgba(234,179,8,0.3))">ᚱ</text>

  <!-- Subtle label arc: STᚱ -->
  <text x="256" y="395" font-family="sans-serif" font-size="24" font-weight="800" fill="#eab308" opacity="0.6" text-anchor="middle" letter-spacing="12" dominant-baseline="central">STᚱ</text>

  <!-- Bottom accent line -->
  <rect x="156" y="412" width="200" height="1.5" rx="0.75" fill="url(#gold-grad)" opacity="0.3"/>
</svg>
