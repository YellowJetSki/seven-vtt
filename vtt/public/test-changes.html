<!DOCTYPE html>
<html>
<body>
<script>
// Test by checking server-side bundle
fetch("/assets/index-BYKiN2TB.js").then(r => r.text()).then(t => {
  // Check for unmistakable Canvas engine patterns
  const artifacts = {
    // Canvas engine
    cells: t.includes("cells = "),
    cellW: t.includes("cellW"),
    cellH: t.includes("cellH"),
    renderLoop: t.includes("requestAnimationFrame"),
    fogClear: t.includes("destination-out"),

    // Premium card specific
    premiumCard: t.includes("CharacterCardPremium") || (t.includes("resolvePortraitUrl") && t.includes("xpThresholds")),
    premiumCardFeatures: t.includes("getClassSummary") && t.includes("getAbilityMod"),

    // CSS
    premiumCSS: t.includes("arcane-glow") || t.includes(".premium-card"),

    // Bundle sizes
    bundleSize: t.length,
    bundleSizeKB: Math.round(t.length / 1024),
  };
  document.body.innerHTML = `<pre>${JSON.stringify(artifacts, null, 2)}</pre>`;
});
</script>
</body>
</html>
