  <circle cx="275" cy="358" r="2" fill="#FDE047" opacity="0.4"/>
  <circle cx="285" cy="357" r="2.5" fill="#FDE047" opacity="0.3"/>
  <ellipse cx="520" cy="360" rx="18" ry="7" fill="#78350F" opacity="0.5"/>
