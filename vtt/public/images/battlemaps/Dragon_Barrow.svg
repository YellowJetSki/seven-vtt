  <ellipse cx="182" cy="218" rx="3" ry="5" fill="#FDE047" opacity="0.4"/>
  <rect x="616" y="220" width="4" height="30" fill="#78350F"/>
  <ellipse cx="618" cy="218" rx="5" ry="8" fill="#F97316" opacity="0.6"/>
