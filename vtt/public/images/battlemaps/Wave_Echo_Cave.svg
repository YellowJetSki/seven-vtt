<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#1A3A5C" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0C1F33"/>
  <rect width="800" height="600" fill="url(#grid2)"/>
  <!-- Underwater cave walls - blue stone -->
  <path d="M0 0 L80 40 L160 20 L240 50 L320 30 L400 45 L480 25 L560 50 L640 35 L720 45 L800 30 L800 0 Z" fill="#1A3A5C"/>
  <path d="M0 600 L80 560 L160 580 L240 550 L320 570 L400 555 L480 575 L560 550 L640 565 L720 555 L800 570 L800 600 Z" fill="#1A3A5C"/>
  <!-- Main pool -->
  <ellipse cx="400" cy="300" rx="300" ry="220" fill="#0F2B45" opacity="0.6"/>
  <ellipse cx="400" cy="300" rx="280" ry="200" fill="#143652" opacity="0.3"/>
  <!-- Water ripples -->
  <ellipse cx="350" cy="280" rx="40" ry="15" fill="none" stroke="#2A5F8A" stroke-width="1" opacity="0.4"/>
  <ellipse cx="350" cy="280" rx="55" ry="20" fill="none" stroke="#2A5F8A" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="500" cy="350" rx="30" ry="10" fill="none" stroke="#2A5F8A" stroke-width="1" opacity="0.3"/>
  <!-- Stone pillars -->
  <rect x="140" y="180" width="30" height="200" rx="5" fill="#2A4A6A"/>
  <rect x="630" y="180" width="30" height="200" rx="5" fill="#2A4A6A"/>
  <rect x="380" y="140" width="30" height="180" rx="5" fill="#2A4A6A"/>
  <!-- Pillar tops -->
  <rect x="130" y="170" width="50" height="15" rx="3" fill="#3A6A8A"/>
  <rect x="620" y="170" width="50" height="15" rx="3" fill="#3A6A8A"/>
  <rect x="370" y="130" width="50" height="15" rx="3" fill="#3A6A8A"/>
  <!-- Glowing crystals -->
  <circle cx="500" cy="200" r="8" fill="#6EE7B7" opacity="0.6"/>
  <circle cx="500" cy="200" r="4" fill="#34D399" opacity="0.9"/>
  <circle cx="200" cy="400" r="6" fill="#6EE7B7" opacity="0.5"/>
  <circle cx="200" cy="400" r="3" fill="#34D399" opacity="0.8"/>
  <circle cx="600" cy="420" r="5" fill="#6EE7B7" opacity="0.4"/>
  <circle cx="600" cy="420" r="2.5" fill="#34D399" opacity="0.7"/>
  <!-- Light rays from above -->
  <polygon points="350,0 340,200 360,200" fill="#6EE7B7" opacity="0.03"/>
  <polygon points="500,0 490,180 510,180" fill="#6EE7B7" opacity="0.02"/>
  <!-- Submerged ruins -->
  <rect x="300" y="380" width="60" height="30" rx="2" fill="#2A4A6A" opacity="0.4"/>
  <rect x="320" y="400" width="20" height="15" rx="1" fill="#2A4A6A" opacity="0.3"/>
  <!-- Water exit passage -->
  <rect x="360" y="460" width="80" height="30" rx="5" fill="#0F2B45" opacity="0.6"/>
  <!-- Bubble particles -->
  <circle cx="320" cy="250" r="2" fill="#6EE7B7" opacity="0.2"/>
  <circle cx="340" cy="230" r="1.5" fill="#6EE7B7" opacity="0.15"/>
  <circle cx="460" cy="300" r="2.5" fill="#6EE7B7" opacity="0.2"/>
  <circle cx="480" cy="270" r="1.5" fill="#6EE7B7" opacity="0.15"/>
  <circle cx="280" cy="340" r="1.8" fill="#6EE7B7" opacity="0.18"/>
  <circle cx="520" cy="320" r="2" fill="#6EE7B7" opacity="0.15"/>
  <!-- Label -->
  <text x="280" y="540" fill="#4A7A9A" font-family="serif" font-size="14" opacity="0.5">Wave Echo Cave · The Lost Mine</text>
</svg>
