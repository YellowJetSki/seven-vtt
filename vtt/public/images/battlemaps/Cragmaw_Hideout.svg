<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#2D1B0E" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#1A0F07"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <!-- Cave walls -->
  <path d="M0 0 L60 20 L120 0 L180 30 L240 10 L300 25 L360 15 L420 30 L480 10 L540 25 L600 15 L660 20 L720 10 L800 20 L800 0 Z" fill="#3D2B1F"/>
  <path d="M0 0 L0 600 L60 580 L120 600 L180 570 L240 590 L300 575 L360 585 L420 570 L480 590 L540 575 L600 585 L660 580 L720 590 L800 580 L800 0 Z" fill="#3D2B1F"/>
  <!-- Upper cave wall -->
  <path d="M0 0 L100 80 L200 60 L300 100 L400 70 L500 90 L600 75 L700 85 L800 65" fill="none" stroke="#5C4033" stroke-width="20"/>
  <!-- Lower cave wall -->
  <path d="M0 600 L100 520 L200 540 L300 500 L400 530 L500 510 L600 525 L700 515 L800 535" fill="none" stroke="#5C4033" stroke-width="20"/>
  <!-- Entrance room floor -->
  <rect x="80" y="100" width="180" height="160" rx="10" fill="#2D1B0E" opacity="0.5"/>
  <!-- Central chamber -->
  <ellipse cx="400" cy="320" rx="160" ry="120" fill="#2D1B0E" opacity="0.4"/>
  <!-- Passageways -->
  <rect x="250" y="130" width="40" height="80" rx="5" fill="#2D1B0E" opacity="0.5"/>
  <rect x="380" y="110" width="40" height="80" rx="5" fill="#2D1B0E" opacity="0.5"/>
  <rect x="300" y="420" width="60" height="80" rx="5" fill="#2D1B0E" opacity="0.5"/>
  <!-- Pools of water -->
  <ellipse cx="150" cy="200" rx="30" ry="15" fill="#1E3A5F" opacity="0.4"/>
  <ellipse cx="500" cy="380" rx="25" ry="12" fill="#1E3A5F" opacity="0.3"/>
  <!-- Stalactites -->
  <polygon points="120,60 125,100 130,60" fill="#5C4033"/>
  <polygon points="280,45 285,85 290,45" fill="#5C4033"/>
  <polygon points="450,55 455,95 460,55" fill="#5C4033"/>
  <polygon points="600,50 605,90 610,50" fill="#5C4033"/>
  <!-- Stalagmites -->
  <polygon points="320,430 325,400 330,430" fill="#5C4033"/>
  <polygon points="480,440 485,410 490,440" fill="#5C4033"/>
  <!-- Treasure chest -->
  <rect x="340" y="360" width="20" height="15" rx="2" fill="#78350F"/>
  <rect x="340" y="360" width="20" height="4" rx="2" fill="#FDE047"/>
  <circle cx="350" cy="367" r="2" fill="#FDE047"/>
  <!-- Goblin patrol markers -->
  <circle cx="180" cy="160" r="6" fill="#65A30D" opacity="0.5"/>
  <circle cx="180" cy="160" r="3" fill="#65A30D"/>
  <circle cx="420" cy="280" r="6" fill="#65A30D" opacity="0.5"/>
  <circle cx="420" cy="280" r="3" fill="#65A30D"/>
  <!-- Label -->
  <text x="260" y="560" fill="#8B7355" font-family="serif" font-size="14" opacity="0.6">Cragmaw Hideout · Cave Entrance</text>
</svg>
