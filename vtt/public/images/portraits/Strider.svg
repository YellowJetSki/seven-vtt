<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="portBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#portBg)" rx="16"/>
  <!-- Shoulder armor -->
  <ellipse cx="60" cy="140" rx="35" ry="45" fill="url(#armorGrad)"/>
  <ellipse cx="140" cy="140" rx="35" ry="45" fill="url(#armorGrad)"/>
  <!-- Head -->
  <ellipse cx="100" cy="90" rx="40" ry="48" fill="#FCD34D"/>
  <!-- Hair/Elven -->
  <ellipse cx="100" cy="70" rx="42" ry="28" fill="#0EA5E9"/>
  <path d="M58 70 Q50 50 60 40" stroke="#0EA5E9" stroke-width="4" fill="none"/>
  <path d="M142 70 Q150 50 140 40" stroke="#0EA5E9" stroke-width="4" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="86" rx="5" ry="4" fill="#F8FAFC"/>
  <ellipse cx="114" cy="86" rx="5" ry="4" fill="#F8FAFC"/>
  <circle cx="86" cy="86" r="2.5" fill="#0EA5E9"/>
  <circle cx="114" cy="86" r="2.5" fill="#0EA5E9"/>
  <!-- Eyebrows -->
  <path d="M78 78 Q86 74 94 78" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M106 78 Q114 74 122 78" stroke="#475569" stroke-width="2" fill="none"/>
  <!-- Nose -->
  <path d="M100 90 L98 100 L102 100" stroke="#B45309" stroke-width="1.5" fill="none"/>
  <!-- Smile -->
  <path d="M90 106 Q100 114 110 106" stroke="#B45309" stroke-width="1.5" fill="none"/>
  <!-- Torso armor -->
  <rect x="60" y="135" width="80" height="90" rx="10" fill="url(#armorGrad)"/>
  <!-- Belt -->
  <rect x="58" y="190" width="84" height="10" rx="3" fill="#78350F"/>
  <rect x="94" y="186" width="12" height="18" rx="2" fill="#FDE047"/>
  <!-- Collar -->
  <path d="M70 135 L100 120 L130 135" fill="#475569" stroke="#334155" stroke-width="2"/>
  <!-- Brooch -->
  <circle cx="100" cy="130" r="6" fill="#FDE047"/>
  <circle cx="100" cy="130" r="3" fill="#F59E0B"/>
</svg>
