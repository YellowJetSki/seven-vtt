<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="portBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="cloakGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#portBg2)" rx="16"/>
  <!-- Cloak -->
  <path d="M40 140 Q30 200 40 270 L160 270 Q170 200 160 140 Z" fill="url(#cloakGrad)"/>
  <!-- Hood up -->
  <path d="M50 100 Q60 40 100 30 Q140 40 150 100 Z" fill="#1F2937"/>
  <!-- Face -->
  <ellipse cx="100" cy="90" rx="35" ry="40" fill="#FDE68A"/>
  <!-- Hair dark -->
  <ellipse cx="100" cy="72" rx="38" ry="22" fill="#1C1917"/>
  <path d="M62 72 Q55 55 65 45" stroke="#1C1917" stroke-width="5" fill="none"/>
  <path d="M138 72 Q145 55 135 45" stroke="#1C1917" stroke-width="5" fill="none"/>
  <!-- Eyes (wispy green) -->
  <ellipse cx="88" cy="86" rx="5" ry="4" fill="#ECFDF5"/>
  <ellipse cx="112" cy="86" rx="5" ry="4" fill="#ECFDF5"/>
  <circle cx="88" cy="86" r="2" fill="#10B981"/>
  <circle cx="112" cy="86" r="2" fill="#10B981"/>
  <!-- Faint green glow effect -->
  <circle cx="88" cy="86" r="8" fill="#10B981" opacity="0.15"/>
  <circle cx="112" cy="86" r="8" fill="#10B981" opacity="0.15"/>
  <!-- Smile -->
  <path d="M92 102 Q100 108 108 102" stroke="#92400E" stroke-width="1.5" fill="none"/>
  <!-- Hands peeking from cloak -->
  <ellipse cx="65" cy="200" rx="12" ry="8" fill="#FDE68A"/>
  <ellipse cx="135" cy="200" rx="12" ry="8" fill="#FDE68A"/>
  <!-- A small wisp floating -->
  <circle cx="150" cy="50" r="6" fill="#6EE7B7" opacity="0.6"/>
  <circle cx="150" cy="50" r="3" fill="#34D399" opacity="0.9"/>
  <circle cx="155" cy="44" r="4" fill="#6EE7B7" opacity="0.4"/>
  <circle cx="145" cy="56" r="3" fill="#6EE7B7" opacity="0.3"/>
</svg>
