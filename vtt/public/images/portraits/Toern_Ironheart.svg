<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="portBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#292524"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="ironArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78716C"/>
      <stop offset="100%" style="stop-color:#57534E"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#portBg3)" rx="16"/>
  <!-- Massive shoulders -->
  <ellipse cx="50" cy="150" rx="45" ry="55" fill="url(#ironArmor)"/>
  <ellipse cx="150" cy="150" rx="45" ry="55" fill="url(#ironArmor)"/>
  <!-- Helmet -->
  <ellipse cx="100" cy="90" rx="42" ry="48" fill="#78716C"/>
  <rect x="58" y="52" width="84" height="50" rx="10" fill="#57534E"/>
  <!-- Helmet visor -->
  <rect x="70" y="70" width="60" height="20" rx="4" fill="#1C1917"/>
  <!-- Eye slits (glowing blue) -->
  <rect x="78" y="76" width="10" height="4" rx="2" fill="#38BDF8"/>
  <rect x="112" y="76" width="10" height="4" rx="2" fill="#38BDF8"/>
  <!-- Helmet crest -->
  <rect x="92" y="40" width="16" height="20" rx="4" fill="#A8A29E"/>
  <rect x="96" y="30" width="8" height="14" rx="3" fill="#D6D3D1"/>
  <!-- Chest plate -->
  <rect x="60" y="140" width="80" height="85" rx="10" fill="url(#ironArmor)"/>
  <!-- Belt with buckle -->
  <rect x="58" y="195" width="84" height="12" rx="3" fill="#44403C"/>
  <rect x="93" y="190" width="14" height="22" rx="2" fill="#FDE047"/>
  <!-- Chainmail visible -->
  <rect x="68" y="148" width="64" height="40" rx="4" fill="#57534E" opacity="0.5"/>
  <!-- Warhammer icon -->
  <line x1="155" y1="160" x2="175" y2="200" stroke="#78716C" stroke-width="5" stroke-linecap="round"/>
  <rect x="165" y="195" width="20" height="10" rx="2" fill="#78716C" transform="rotate(20 175 200)"/>
</svg>
